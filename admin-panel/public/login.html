<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – Employee Monitor</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #1565c0 100%);
    font-family: 'Segoe UI', sans-serif;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 48px 40px;
    width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .logo {
    text-align: center;
    font-size: 48px;
    margin-bottom: 12px;
  }
  h1 {
    text-align: center;
    color: #1a237e;
    font-size: 22px;
    margin-bottom: 4px;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 13px;
    margin-bottom: 32px;
  }
  label {
    display: block;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
    font-weight: 600;
  }
  input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 15px;
    margin-bottom: 20px;
    outline: none;
    transition: border 0.2s;
  }
  input:focus { border-color: #1a237e; }
  button {
    width: 100%;
    padding: 14px;
    background: #1a237e;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #283593; }
  .error {
    background: #ffebee;
    color: #c62828;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 20px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🛡️</div>
  <h1>Employee Monitor</h1>
  <p class="subtitle">Admin Panel – Authorized Access Only</p>

  <form method="POST" action="/login">
    <div id="errMsg" style="display:none" class="error">❌ Invalid credentials</div>
    <label>Username</label>
    <input type="text" name="username" placeholder="admin" required autocomplete="username">
    <label>Password</label>
    <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
    <button type="submit">Login →</button>
  </form>
</div>
<script>
  if (location.search.includes('error=1')) {
    document.getElementById('errMsg').style.display = 'block';
  }
</script>
</body>
</html>
